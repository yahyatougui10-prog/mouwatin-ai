services:
  mouwatin-ai:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - PORT=3000
      - DB_PATH=/app/data/mouwatin.db
      - RATE_LIMIT=${RATE_LIMIT:-30}
    volumes:
      - mouwatin-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

