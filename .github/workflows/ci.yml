name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Lint with pyflakes
        run: |
          pip install pyflakes
          pyflakes server.py
      - name: Check HTML validity
        run: |
          pip install html5validator
          html5validator --root .
      - name: Start server and test health endpoint
        run: |
          python3 server.py &
          SERVER_PID=$!
          sleep 2
          curl -f http://localhost:3000/api/health || (kill $SERVER_PID; exit 1)
          curl -f http://localhost:3000/ || (kill $SERVER_PID; exit 1)
          kill $SERVER_PID
      - name: Test static files
        run: |
          test -f index.html
          test -f style.css
          test -f script.js
          test -f server.py
