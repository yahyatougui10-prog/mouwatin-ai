name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Lint with pyflakes
        run: |
          pip install pyflakes
          pyflakes server.py
      - name: Check HTML validity
        run: |
          pip install html5validator
          html5validator --root .
